# Database Seed Data Configuration
# This file contains all default data that gets seeded when running `npm run seed`

roles:
  - name: admin
    displayName: Administrator
    description: Full system access - can access admin panel and all system configuration
    permissions:
      canAccessAdmin: true
      canEditContent: true
      canEditTables: ["*"]
    isActive: true
    displayOrder: 0

  - name: editor
    displayName: Editor
    description: Content management access - can edit content but NOT system configuration
    permissions:
      canAccessAdmin: false
      canEditContent: true
      canEditTables:
        - projects
        - skills
        - certifications
        - education
        - workExperiences
        - services
        - testimonials
        - blog
    isActive: true
    displayOrder: 1

  - name: user
    displayName: User
    description: Customer/employer account - NO admin panel access, limited to profile/portfolio viewing
    permissions:
      canAccessAdmin: false
      canEditContent: false
      canEditTables: []
    isActive: true
    displayOrder: 2

  - name: visitor
    displayName: Visitor
    description: Unauthenticated user - public access only
    permissions:
      canAccessAdmin: false
      canEditContent: false
      canEditTables: []
    isActive: true
    displayOrder: 3

