discounts:
  - code: WEBSITE50
    description: 50% off for the next 50 website projects (excludes charity/non-profit)
    discountType: percent
    amount: "50"
    currency: ILS
    appliesTo:
      projectTypes:
        - website
      excludeClientTypes:
        - charity
        - non-profit
    startsAt: null  # Will be set to current date in script
    endsAt: null
    maxUses: 50
    perUserLimit: 1
    isActive: true

  - code: STARTUP2024
    description: 20% off for startup clients - first 100 projects
    discountType: percent
    amount: "20"
    currency: ILS
    appliesTo:
      projectTypes:
        - website
        - app
        - saas
    startsAt: null  # Will be set to current date in script
    endsAt: null  # Will be set to 1 year from now in script
    maxUses: 100
    perUserLimit: 1
    isActive: true

  - code: CHARITY100
    description: 1000 ILS fixed discount for charity/non-profit organizations
    discountType: fixed
    amount: "1000"
    currency: ILS
    appliesTo:
      projectTypes:
        - website
        - app
        - ecommerce
    startsAt: null  # Will be set to current date in script
    endsAt: null
    maxUses: null  # Unlimited
    perUserLimit: 1
    isActive: true

proposals:
  statuses:
    - key: draft
      label: Draft
      color: grey
    - key: sent
      label: Sent
      color: blue
    - key: accepted
      label: Accepted
      color: green
    - key: declined
      label: Declined
      color: red
    - key: expired
      label: Expired
      color: orange

  templates:
    - name: Standard Proposal
      description: A standard proposal template with common sections
      defaultCurrency: ILS
      defaultTaxProfileKey: israel-vat
      defaultPriceDisplay: taxExclusive
      templateData:
        sections:
          - key: development
            label: Development Services
            description: Core development work
            sortOrder: 0
          - key: additional
            label: Additional Services
            description: Optional add-ons
            sortOrder: 1
      isActive: true
      displayOrder: 0

# Note: Intake templates and Email templates are too large/complex for YAML
# They remain in their respective seed scripts but can reference constants from seed-constants.ts

